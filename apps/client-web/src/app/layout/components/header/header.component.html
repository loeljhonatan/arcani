<header class="h-20 border-b border-aura-glass bg-fondo-sombra/60 backdrop-blur-xl flex items-center justify-between px-8 sticky top-0 z-50 transition-all duration-700">

  <!-- LOGO -->
  <div routerLink="/home" class="flex items-center cursor-pointer group">
    <span class="text-2xl font-maestra font-bold text-aura transition-all group-hover:drop-shadow-[0_0_8px_var(--color-aura)]">
      ARCANI
    </span>
  </div>

  <!-- NAVEGACIÓN Y ACCIONES -->
  <div class="flex items-center gap-6">

    @if (auth.user()) {
      <div class="flex items-center gap-4 animate-fade-in">

        <!-- INFO DEL EXPLORADOR: Solo si tiene permiso de acceso al perfil -->
        @if (auth.hasPermission('user_orbit_access')) {
          <div class="flex flex-col items-end hidden md:flex">
            <span class="font-maestra text-[10px] font-bold text-aura uppercase tracking-widest">
              {{ auth.user()?.name }}
            </span>
            <span class="font-tecnica text-[8px] opacity-50 uppercase tracking-[0.2em]">
              {{ auth.user()?.roleName }}
            </span>
          </div>
        }

        <!-- AVATAR SINTONIZADO -->
        <p-avatar="auth.user()?.photoURL || undefined"
          [label]="!auth.user()?.photoURL ? auth.user()?.name?.charAt(0) : undefined"
          shape="circle"
          size="large"
          class="border border-aura shadow-aura-neon cursor-pointer transition-transform hover:scale-110">
        </p-avatar>

        <!-- BOTÓN DE CIERRE -->
        <p-button
          icon="pi pi-power-off"="true"
          severity="danger"
          (onClick)="logout()"
          pTooltip="Cerrar Portal">
        </p-button>
      </div>
    } @else {
      <!-- LOGIN: Para usuarios anónimos -->
      <p-button
        label="SINTONIZAR"="true"
        (onClick)="login()"
        class="font-tecnica tracking-widest text-xs">
      </p-button>
    }

  </div>
</header>
