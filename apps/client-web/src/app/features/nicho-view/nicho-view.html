<div class="min-h-screen p-8 bg-[var(--bg-nicho)] text-white transition-colors duration-500">
  <h1 class="text-4xl font-bold mb-4" [style.color]="store.aura()">
    Bienvenido al Portal
  </h1>

  <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
    <!-- Card sintonizada automáticamente -->
    <div class="p-6 bg-white/5 backdrop-blur-[var(--blur-nicho)] border border-[var(--aura-nicho)]"
         [style.border-radius]="store.styles()['--radius-nicho']">
      <h2 class="text-xl font-semibold">Producto de Culto</h2>
      <p class="mt-2 opacity-70">Este contenedor reacciona a la frecuencia activa.</p>

      <button class="mt-4 px-6 py-2 bg-[var(--aura-nicho)] text-black font-bold uppercase transition-transform hover:scale-105"
              [style.border-radius]="store.styles()['--radius-nicho']">
        Explorar
      </button>
    </div>
  </div>
</div>
